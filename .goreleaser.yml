version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: quien
    package_name: quien
    vendor: retlehs
    homepage: https://github.com/retlehs/quien
    maintainer: Ben Word <ben@benword.com>
    description: A better WHOIS lookup tool with interactive TUI
    license: MIT
    formats:
      - deb
    bindir: /usr/bin

changelog:
  sort: asc
